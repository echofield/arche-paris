# ARCHÉ — Supabase project config (used by CLI for deploy)
# See https://supabase.com/docs/guides/cli/config

[functions.card-gate]
entrypoint = "functions/card-gate/index.tsx"
# Allow unauthenticated invocations (card auth is handled inside the function via code+password/cookie)
verify_jwt = false

[functions.make-server-9060b10a]
entrypoint = "functions/make-server-9060b10a/index.tsx"

[functions.zone-consciousness]
entrypoint = "functions/zone-consciousness/index.ts"
# Gateway JWT disabled: function enforces runtime auth (Bearer or card session headers).
verify_jwt = false
